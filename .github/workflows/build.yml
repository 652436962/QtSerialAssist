name: 跨平台构建

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-2022, macos-latest]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          modules: 'qtserialport'
          cache: true

      - name: 安装 Linux 依赖
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libglu1-mesa-dev

      - name: 配置 CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: 编译
        run: cmake --build build --config Release --parallel

      - name: 打包 Linux (AppImage / deb / rpm)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y libfuse2 rpm alien
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION=${{ inputs.version }}
          elif [ "${GITHUB_REF#refs/tags/v}" != "$GITHUB_REF" ]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=1.0.0
          fi
          echo "VERSION=$VERSION"
          ARCH=x86_64

          # ---- AppDir ----
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp build/QtSerialAssist AppDir/usr/bin/
          cp -r build/commands AppDir/usr/bin/
          cp build/QtSerialAssist_zh_CN.qm AppDir/usr/bin/ 2>/dev/null || true

          cat > AppDir/usr/share/applications/qtserialassist.desktop << 'DF'
          [Desktop Entry]
          Type=Application
          Name=QtSerialAssist
          Comment=串口/网络调试助手
          Exec=QtSerialAssist
          Icon=qtserialassist
          Categories=Development;
          Terminal=false
          DF

          cat > AppDir/AppRun << 'AR'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          export PATH="$HERE/usr/bin:$PATH"
          export LD_LIBRARY_PATH="$HERE/usr/lib:$LD_LIBRARY_PATH"
          export QT_PLUGIN_PATH="$HERE/usr/plugins"
          export QML2_IMPORT_PATH="$HERE/usr/qml"
          exec "$HERE/usr/bin/QtSerialAssist" "$@"
          AR
          chmod +x AppDir/AppRun

          touch AppDir/usr/share/icons/hicolor/256x256/apps/qtserialassist.png

          # ---- AppImage (linuxdeploy + qt plugin) ----
          wget -nv https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -nv https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          export LDAI_OUTPUT="QtSerialAssist-${VERSION}-${ARCH}.AppImage"
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --plugin qt --output appimage

          # ---- deb ----
          mkdir -p deb-pkg/DEBIAN
          cp -r AppDir/usr deb-pkg/
          cat > deb-pkg/DEBIAN/control << CTRL
          Package: qtserialassist
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: QtSerialAssist
          Description: 跨平台串口/网络调试助手
          CTRL
          dpkg-deb --build deb-pkg "qtserialassist_${VERSION}_amd64.deb"

          # ---- rpm (alien convert) ----
          alien -r --scripts "qtserialassist_${VERSION}_amd64.deb"
          mv qtserialassist-${VERSION}-*.rpm "qtserialassist-${VERSION}.x86_64.rpm" 2>/dev/null || true

          # ---- copy artifacts ----
          mkdir -p packages
          cp QtSerialAssist-*.AppImage packages/
          cp qtserialassist_*.deb packages/
          cp qtserialassist-*.rpm packages/
          ls -lh packages/

      - name: 上传 Linux 包 (AppImage/deb/rpm)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: QtSerialAssist-Linux
          path: packages/

      - name: 打包 Windows (windeployqt)
        if: runner.os == 'Windows'
        run: |
          windeployqt --release --no-translations build/Release/QtSerialAssist.exe
          mkdir dist
          Copy-Item -Recurse build/Release/* dist/
          Remove-Item -Force dist/QtSerialAssist_zh_CN.qm -ErrorAction SilentlyContinue

      - name: 上传构建产物 (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: QtSerialAssist-Windows
          path: dist/

      - name: 上传构建产物 (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: QtSerialAssist-macOS
          path: build/QtSerialAssist.app

  release:
    name: 创建 Release
    needs: build
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 整理产物 (扁平化，排除 json)
        run: |
          mkdir -p release
          find artifacts -type f -not -name '*.json' -exec mv {} release/ \;
          ls -lh release/

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
