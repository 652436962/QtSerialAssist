name: 跨平台构建

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-2022, macos-13]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          modules: 'qtserialport'
          cache: true

      - name: 安装 Linux 依赖
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libglu1-mesa-dev

      - name: 配置 CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: 编译
        run: cmake --build build --parallel

      - name: 上传构建产物 (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: QtSerialAssist-Linux
          path: build/QtSerialAssist

      - name: 上传构建产物 (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: QtSerialAssist-Windows
          path: build/Release/QtSerialAssist.exe

      - name: 上传构建产物 (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: QtSerialAssist-macOS
          path: build/QtSerialAssist.app
